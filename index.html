<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Spradon Sistem Giriş</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}
input {
  padding:10px;
  width:200px;
  margin:10px 0;
}
button {
  padding:10px 20px;
  background:#1F2A44;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Spradon Operasyon</h2>
  <input type="password" id="sifre" placeholder="Şifre">
  <br>
  <button onclick="giris()">Giriş</button>
</div>

<script>
function giris() {
  let s = document.getElementById("sifre").value;

  if (s === "spr2026") {
    window.location.href = "panel.html";
  } else {
    alert("Hatalı şifre");
  }
}
</script>

</body>
</html>
