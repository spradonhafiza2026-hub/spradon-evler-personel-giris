```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malzeme Talep</title>

<style>
body{font-family:Arial;background:#2f3e3e;color:white;padding:20px}
.box{background:#445a5a;padding:15px;border-radius:10px;margin-bottom:15px}
input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{padding:8px 12px;border:none;border-radius:6px;background:#d6cf72;font-weight:bold;cursor:pointer}
.item{background:#3b5050;padding:10px;margin:10px 0;border-radius:8px}
.durum{font-size:12px;margin-top:5px}
.bekle{color:orange}
.onay{color:lightgreen}
.red{color:#ff6b6b}
</style>
</head>

<body>

<h2>📦 Malzeme Talep</h2>

<div class="box">
<input id="ad" placeholder="Ad Soyad">
<input id="malzeme" placeholder="Malzeme">
<input id="adet" type="number" placeholder="Adet">
<textarea id="aciklama" placeholder="Açıklama"></textarea>
<button onclick="ekle()">Talep Oluştur</button>
</div>

<div id="liste"></div>

<script>
const key="talep_list";

function get(){return JSON.parse(localStorage.getItem(key)||"[]")}
function set(data){localStorage.setItem(key,JSON.stringify(data))}

function ekle(){
let data=get();
data.push({
ad:ad.value,
malzeme:malzeme.value,
adet:adet.value,
aciklama:aciklama.value,
tarih:new Date().toLocaleString(),
durum:"bekliyor"
});
set(data);
goster();
}

function goster(){
let data=get();
liste.innerHTML="";
data.forEach(x=>{
liste.innerHTML+=`
<div class="item">
<b>${x.ad}</b><br>
${x.malzeme} (${x.adet})<br>
${x.aciklama}<br>
<small>${x.tarih}</small>
<div class="durum ${x.durum}">
Durum: ${x.durum}
</div>
</div>`;
});
}
goster();
</script>

</body>
</html>
```
